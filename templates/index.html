<!DOCTYPE html>
<html>
<head>
<title>Nestiq AI</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:#0e0c06;
  color:white;
  overflow:hidden;
}

.screen {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.screen.active { display:flex; }

h1 {
  font-size:60px;
  letter-spacing:2px;
}

button {
  padding:12px 28px;
  background:#c4603a;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  margin:10px;
}

#price {
  font-size:45px;
  color:#e8d5a3;
}
</style>
</head>

<body>

<div class="screen active" id="s1">
  <h1>Nestiq</h1>
  <p>AI Powered Property Valuation</p>
  <button onclick="next()">Start</button>
</div>

<div class="screen" id="s2">
  <h2>Select Location</h2>
  <select id="location"></select>
  <button onclick="next()">Next</button>
</div>

<div class="screen" id="s3">
  <h2>Enter Sqft</h2>
  <input type="number" id="sqft">
  <button onclick="next()">Next</button>
</div>

<div class="screen" id="s4">
  <h2>BHK</h2>
  <select id="bhk">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
  </select>
  <button onclick="next()">Next</button>
</div>

<div class="screen" id="s5">
  <h2>Floors</h2>
  <select id="floor">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
  </select>
  <button onclick="predict()">Predict</button>
</div>

<div class="screen" id="s6">
  <h2>Predicted Price</h2>
  <div id="price">...</div>
  <div id="details"></div>
  <button onclick="restart()">Restart</button>
</div>

<script>

let screens = document.querySelectorAll(".screen");
let current = 0;

function next(){
  screens[current].classList.remove("active");
  current++;
  screens[current].classList.add("active");
}

function restart(){
  location.reload();
}

async function loadLocations(){
  let res = await fetch('/get_locations');
  let data = await res.json();

  let select = document.getElementById("location");
  data.locations.slice(0,20).forEach(loc=>{
    let opt = document.createElement("option");
    opt.text = loc;
    select.add(opt);
  });
}

loadLocations();

function predict(){

  next();

  let location = document.getElementById("location").value;
  let sqft = parseFloat(document.getElementById("sqft").value);
  let bhk = parseInt(document.getElementById("bhk").value);
  let floor = parseInt(document.getElementById("floor").value);

  fetch('/predict',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      location, sqft, bhk, floor
    })
  })
  .then(res=>res.json())
  .then(data=>{

    let price = data.price;
    let lakh = price / 100000;

    document.getElementById("price").innerText =
      "₹ " + lakh.toFixed(2) + " L";

    document.getElementById("details").innerHTML =
      `📍 ${location} | ${sqft} sqft | ${bhk} BHK`;

  });
}

</script>

</body>
</html>
</html>s
