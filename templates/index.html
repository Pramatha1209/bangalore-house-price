<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Property Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="app">

    <!-- Welcome -->
    <section class="screen active">
        <h1>🏠 Smart Property Predictor</h1>
        <button onclick="nextScreen()">Start</button>
    </section>

    <!-- Location -->
    <section class="screen">
        <h2>Select Location</h2>
        <select id="locationSelect">
            <option value="1st Phase JP Nagar">1st Phase JP Nagar</option>
            <option value="Indiranagar">Indiranagar</option>
            <option value="Whitefield">Whitefield</option>
        </select>
        <button onclick="nextScreen()">Next</button>
    </section>

    <!-- Sqft -->
    <section class="screen">
        <h2>Select Sqft</h2>
        <input type="range" min="500" max="5000" id="sqftRange" oninput="updateSqft()">
        <p id="sqftValue">500</p>
        <button onclick="nextScreen()">Next</button>
    </section>

    <!-- BHK -->
    <section class="screen">
        <h2>Select BHK</h2>
        <div>
            <button onclick="selectBHK(1)">1 BHK</button>
            <button onclick="selectBHK(2)">2 BHK</button>
            <button onclick="selectBHK(3)">3 BHK</button>
            <button onclick="selectBHK(4)">4 BHK</button>
        </div>
        <button onclick="nextScreen()">Next</button>
    </section>

    <!-- Floors -->
    <section class="screen">
        <h2>Select Floors</h2>
        <div>
            <button onclick="selectFloor(1)">1</button>
            <button onclick="selectFloor(2)">2</button>
            <button onclick="selectFloor(3)">3</button>
            <button onclick="selectFloor(4)">4</button>
        </div>
        <button onclick="predict()">Predict</button>
    </section>

    <!-- Result -->
    <section class="screen">
        <h2>💰 Predicted Price</h2>
        <p id="price">Calculating...</p>
        <button onclick="restart()">Try Again</button>
    </section>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
