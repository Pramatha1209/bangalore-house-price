<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bengaluru House Price Predictor</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    h1 { text-align: center; color: #333; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
    button { width: 100%; padding: 12px; margin-top: 20px; background: #2563eb; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #result { margin-top: 20px; text-align: center; font-size: 24px; font-weight: bold; color: #16a34a; }
  </style>
</head>
<body>
  <h1>Bengaluru House Price Predictor</h1>

  <label>Location</label>
  <select id="location"></select>

  <label>Total Square Feet</label>
  <input type="number" id="sqft" placeholder="e.g. 1000" value="1000"/>

  <label>BHK (Bedrooms)</label>
  <input type="number" id="bhk" placeholder="e.g. 2" value="2"/>

  <label>Bathrooms</label>
  <input type="number" id="bath" placeholder="e.g. 2" value="2"/>

  <button onclick="predict()">Predict Price</button>

  <div id="result"></div>

  <script>
    // Load locations on page load
    fetch('/get_locations')
      .then(r => r.json())
      .then(data => {
        const sel = document.getElementById('location');
        data.locations.forEach(loc => {
          const opt = document.createElement('option');
          opt.value = loc;
          opt.textContent = loc.replace(/\b\w/g, c => c.toUpperCase());
          sel.appendChild(opt);
        });
      });

    // Predict price
    function predict() {
      const data = {
        location: document.getElementById('location').value,
        total_sqft: document.getElementById('sqft').value,
        bhk: document.getElementById('bhk').value,
        bath: document.getElementById('bath').value
      };

      document.getElementById('result').textContent = 'Predicting...';

      fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById('result').textContent = '₹ ' + data.price + ' Lakhs';
      })
      .catch(() => {
        document.getElementById('result').textContent = 'Error! Try again.';
      });
    }
  </script>
</body>
</html>
