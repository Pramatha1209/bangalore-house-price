<!DOCTYPE html>
<html>
<head>
<title>Nestiq AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#0f0c07,#2a1c0e);
  color:white;
  overflow:hidden;
}

/* screens */
.screen {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition:0.5s;
}

.screen.active {
  display:flex;
  animation: slide 0.6s ease;
}

@keyframes slide {
  from {opacity:0; transform:translateX(50px);}
  to {opacity:1; transform:translateX(0);}
}

/* buttons */
button {
  padding:12px 25px;
  margin:10px;
  background:#c4603a;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* map grid */
.map {
  display:grid;
  grid-template-columns:repeat(3,120px);
  gap:15px;
}

.zone {
  background:#2d1f0e;
  padding:20px;
  border-radius:10px;
  cursor:pointer;
}

.zone:hover {
  background:#c4603a;
}

/* input */
input {
  padding:10px;
  border:none;
  border-radius:6px;
}

/* result */
#price {
  font-size:40px;
  color:#e8d5a3;
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div class="screen active" id="s1">
  <h1>Nestiq AI</h1>
  <p>Smart Property Valuation</p>
  <button onclick="next()">Start</button>
</div>

<!-- Screen 2 -->
<div class="screen" id="s2">
  <h2>Select Area</h2>
  <div class="map" id="map"></div>
  <button onclick="next()">Next</button>
</div>

<!-- Screen 3 -->
<div class="screen" id="s3">
  <input id="sqft" placeholder="Enter Sqft">
  <button onclick="next()">Next</button>
</div>

<!-- Screen 4 -->
<div class="screen" id="s4">
  <button onclick="S.bhk=1">1 BHK</button>
  <button onclick="S.bhk=2">2 BHK</button>
  <button onclick="S.bhk=3">3 BHK</button>
  <button onclick="S.bhk=4">4 BHK</button>
  <button onclick="next()">Next</button>
</div>

<!-- Screen 5 -->
<div class="screen" id="s5">
  <button onclick="S.floor=1">1 Floor</button>
  <button onclick="S.floor=2">2 Floors</button>
  <button onclick="predict()">Predict</button>
</div>

<!-- Result -->
<div class="screen" id="s6">
  <h2>Predicted Price</h2>
  <div id="price">...</div>
  <canvas id="chart" width="300"></canvas>
</div>

<script>

let screens = document.querySelectorAll(".screen");
let current = 0;

let S = {location:"", sqft:1000, bhk:2, floor:1};
let allLocations = [];

/* navigation */
function next(){
  screens[current].classList.remove("active");
  current++;
  screens[current].classList.add("active");
}

/* load locations */
async function loadLocations(){
  let res = await fetch('/get_locations');
  let data = await res.json();
  allLocations = data.locations;

  createMap();
}

loadLocations();

/* create map grid */
function createMap(){
  let map = document.getElementById("map");

  allLocations.slice(0,9).forEach(loc=>{
    let div = document.createElement("div");
    div.className = "zone";
    div.innerText = loc;
    div.onclick = () => S.location = loc;
    map.appendChild(div);
  });
}

/* predict */
function predict(){
  next();

  S.sqft = document.getElementById("sqft").value;

  fetch('/predict',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(S)
  })
  .then(res=>res.json())
  .then(data=>{
    animatePrice(data.price);
    showChart(data.price);
  });
}

/* animate price */
function animatePrice(price){
  let count = 0;
  let interval = setInterval(()=>{
    count += price/30;
    if(count>=price){
      count = price;
      clearInterval(interval);
    }
    document.getElementById("price").innerText =
      "₹ " + Math.round(count);
  },50);
}

/* chart */
function showChart(price){
  let ctx = document.getElementById("chart");

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Low','Mid','High'],
      datasets: [{
        label: 'Price Range',
        data: [price*0.9, price, price*1.1],
        borderWidth: 2
      }]
    }
  });
}

</script>

</body>
</html>
