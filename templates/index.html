<script>
function runPredict() {
  goTo(6);
  const wrap = document.getElementById('resWrap');

  // Loader UI (same as your design)
  wrap.innerHTML = `
    <div class="loader-anim">
      <div class="loader-ring">
        <div class="lr-outer"></div>
        <div class="lr-inner"></div>
      </div>
      <div class="loader-msg">AI is analysing your property…</div>
    </div>
  `;

  // 🔥 REAL BACKEND CALL
  setTimeout(() => {
    fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        location: S.area,
        sqft: S.sqft,
        bhk: S.bhk,
        floor: S.floors
      })
    })
    .then(res => res.json())
    .then(data => {

      const price = data.price;
      const lakh = price / 100000;

      const lo = (lakh * 0.92).toFixed(1);
      const hi = (lakh * 1.08).toFixed(1);

      wrap.innerHTML = `
        <div class="res-card">
          <div class="res-eyebrow">Estimated Market Value</div>
          <div class="res-price">₹ ${lakh.toFixed(2)} L</div>
          <div class="res-range">Range: ₹${lo}L – ₹${hi}L</div>

          <div class="res-sep"></div>

          <div class="res-tags">
            <div class="res-tag">
              <div class="res-tag-k">Location</div>
              <div class="res-tag-v">${S.area}</div>
            </div>
            <div class="res-tag">
              <div class="res-tag-k">Size</div>
              <div class="res-tag-v">${S.sqft} sqft</div>
            </div>
            <div class="res-tag">
              <div class="res-tag-k">BHK</div>
              <div class="res-tag-v">${S.bhk}</div>
            </div>
          </div>

          <div class="res-actions">
            <button class="btn-ghost" onclick="resetAll()">Try Again</button>
          </div>
        </div>
      `;

    })
    .catch(err => {
      wrap.innerHTML = "<h2 style='color:red'>Error getting prediction</h2>";
      console.error(err);
    });

  }, 2000);
}
</script>
