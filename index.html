<!DOCTYPE html>
<html>
<head>
  <title>Building Interaction</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', Arial;
      background: linear-gradient(135deg, #fdfcfb, #e2d1c3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      perspective: 1200px;
    }

    .building {
      display: flex;
      flex-direction: column;
      gap: 10px;
      transform-style: preserve-3d;
      transition: transform 0.2s ease;
    }

    .floor {
      width: 200px;
      height: 50px;
      background: linear-gradient(145deg, #ffffff, #e6e6e6);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .floor:hover {
      transform: scale(1.08);
      box-shadow: 
        0 10px 30px rgba(0,0,0,0.2),
        0 0 20px rgba(255, 200, 0, 0.6);
    }

    .floor-view {
      display: none;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.3);
      padding: 20px;
      border-radius: 20px;
      animation: zoomIn 0.6s ease;
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.4) translateY(100px);
        opacity: 0;
        filter: blur(10px);
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
        filter: blur(0);
      }
    }

    .rooms {
      display: grid;
      grid-template-columns: repeat(2, 100px);
      gap: 10px;
    }

    .room {
      width: 100px;
      height: 100px;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      transition: 0.3s;
    }

    .room:hover {
      transform: scale(1.05);
    }

    .ripple {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(59,130,246,0.6) 20%, transparent 70%);
      border-radius: 50%;
      animation: rippleEffect 0.8s ease-out;
    }

    @keyframes rippleEffect {
      from {
        transform: scale(0);
        opacity: 1;
      }
      to {
        transform: scale(6);
        opacity: 0;
      }
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: linear-gradient(135deg, #000, #333);
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div id="building" class="building"></div>

<div id="floorView" class="floor-view">
  <h2 id="floorTitle"></h2>
  <div class="rooms" id="rooms"></div>
  <p id="bathCount">Bathrooms: 0</p>
  <button onclick="goBack()">Back</button>
</div>

<script>
  const building = document.getElementById("building");
  const floorView = document.getElementById("floorView");
  const floorTitle = document.getElementById("floorTitle");
  const roomsContainer = document.getElementById("rooms");
  const bathCount = document.getElementById("bathCount");

  let bathrooms = 0;

  // 🏢 Create floors
  for (let i = 1; i <= 5; i++) {
    const floor = document.createElement("div");
    floor.className = "floor";
    floor.innerText = `Floor ${i} (${i} BHK)`;

    floor.onclick = () => enterFloor(i);

    building.appendChild(floor);
  }

  // 🎬 Enter floor
  function enterFloor(floor) {
    building.style.display = "none";
    floorView.style.display = "flex";

    floorTitle.innerText = `Floor ${floor} Layout`;
    bathrooms = 0;
    updateBath();

    roomsContainer.innerHTML = "";

    for (let i = 1; i <= 4; i++) {
      const room = document.createElement("div");
      room.className = "room";
      room.innerText = "Room";

      room.onclick = (e) => addBathroom(e, room);

      roomsContainer.appendChild(room);
    }
  }

  // 💧 Bathroom ripple
  function addBathroom(e, room) {
    bathrooms++;
    updateBath();

    const ripple = document.createElement("span");
    ripple.className = "ripple";

    ripple.style.left = e.offsetX + "px";
    ripple.style.top = e.offsetY + "px";

    room.appendChild(ripple);

    setTimeout(() => ripple.remove(), 800);
  }

  function updateBath() {
    bathCount.innerText = "Bathrooms: " + bathrooms;
  }

  function goBack() {
    floorView.style.display = "none";
    building.style.display = "flex";
  }

  // 🎯 3D Tilt Effect
  document.addEventListener("mousemove", (e) => {
    const x = (window.innerWidth / 2 - e.clientX) / 25;
    const y = (window.innerHeight / 2 - e.clientY) / 25;

    building.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
  });
</script>

</body>
</html>
